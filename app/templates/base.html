<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>TaskManager</title>

    <!-- PWA -->
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#020302">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Tasks">
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ═══════════════════════════════════════════
           DESIGN SYSTEM — Blackout Neon Green
           ═══════════════════════════════════════════ */
        :root {
            --bg: #020302;
            --bg-gradient: none;
            --surface: rgba(8,10,8,0.88);
            --surface-solid: #0a0d0a;
            --surface-hover: rgba(14,18,14,0.96);
            --surface-raised: rgba(11,15,11,0.96);
            --border: rgba(149,255,69,0.11);
            --border-hover: rgba(149,255,69,0.28);
            --text: #f3fff0;
            --text-secondary: rgba(221,235,216,0.72);
            --text-tertiary: rgba(160,179,155,0.54);
            --accent: #95ff45;
            --accent-bright: #c4ff8a;
            --accent-glow: rgba(149,255,69,0.18);
            --green: #30ff85;
            --green-glow: rgba(48,255,133,0.14);
            --orange: #FFB800;
            --orange-glow: rgba(255,184,0,0.15);
            --red: #FF4D6A;
            --red-glow: rgba(255,77,106,0.15);
            --purple: #79ff5b;
            --purple-glow: rgba(121,255,91,0.12);
            --cyan: #63ffaf;
            --cyan-glow: rgba(99,255,175,0.14);
            --yellow: #FFE566;
            --neon-pink: #b4ff72;
            --neon-pink-glow: rgba(180,255,114,0.12);
            --radius: 16px;
            --radius-sm: 12px;
            --radius-xs: 10px;
            --shadow-sm: 0 8px 24px rgba(0,0,0,0.34);
            --shadow-md: 0 18px 48px rgba(0,0,0,0.48);
            --shadow-lg: 0 28px 80px rgba(0,0,0,0.58);
            --glow-accent: 0 0 24px rgba(149,255,69,0.22);
            --glow-green: 0 0 24px rgba(48,255,133,0.22);
            --glow-purple: 0 0 20px rgba(121,255,91,0.18);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            min-height: 100vh;
            min-height: 100dvh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 0 16px;
        }

        /* ── Nav ─────────────────────────────── */
        nav {
            background: rgba(2,4,2,0.94);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border-bottom: 1px solid rgba(149,255,69,0.10);
            padding: 12px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        nav .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }
        nav .brand {
            font-size: 15px;
            font-weight: 800;
            color: var(--text);
            text-decoration: none;
            letter-spacing: -0.5px;
        }
        nav .brand span {
            color: var(--accent-bright);
        }
        nav .nav-links { display: none; }
        nav .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            padding: 7px 14px;
            border-radius: var(--radius-xs);
            transition: all 0.2s;
            white-space: nowrap;
        }
        nav .nav-links a.active {
            color: var(--accent-bright);
            background: var(--accent-glow);
        }
        nav .nav-links a:hover { color: var(--text); background: rgba(149,255,69,0.08); }
        nav .nav-links a.nav-cta {
            background: var(--accent);
            color: #041005;
            font-weight: 600;
            box-shadow: var(--glow-accent);
        }
        nav .nav-links a.nav-cta:hover { background: var(--accent-bright); }

        .page-content { padding: 20px 0 100px; }

        /* ── Glass Card ──────────────────────── */
        .card {
            background: var(--surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 14px;
            box-shadow: var(--shadow-sm);
        }

        .visual-card {
            position: relative;
            overflow: hidden;
            border-radius: 22px;
            border: 1px solid rgba(149,255,69,0.10);
            background: rgba(7,10,7,0.92);
            box-shadow: var(--shadow-md);
            min-height: 170px;
        }
        .visual-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .visual-card-copy {
            position: absolute;
            left: 16px;
            right: 16px;
            bottom: 16px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 12px 14px;
            border-radius: 16px;
            background: rgba(3,5,3,0.78);
            border: 1px solid rgba(149,255,69,0.10);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
        }
        .visual-card-copy strong {
            font-size: 14px;
            letter-spacing: -0.02em;
        }
        .visual-card-copy span {
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.5;
        }
        .visual-card.compact {
            min-height: 140px;
        }

        /* ── Buttons ─────────────────────────── */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 9px 16px;
            border-radius: var(--radius-xs);
            border: none;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            font-family: inherit;
            text-decoration: none;
            transition: all 0.2s;
            min-height: 40px;
            white-space: nowrap;
            --loader-track: rgba(149,255,69,0.20);
            --loader-head: var(--accent-bright);
        }
        .btn-primary {
            background: var(--accent);
            color: #041005;
            box-shadow: var(--glow-accent);
            --loader-track: rgba(4,16,5,0.22);
            --loader-head: #041005;
        }
        .btn-primary:hover { background: var(--accent-bright); box-shadow: 0 0 28px rgba(149,255,69,0.30); }
        .btn-success {
            background: var(--green-glow);
            color: var(--green);
            border: 1px solid rgba(48,255,133,0.20);
        }
        .btn-success:hover { background: rgba(48,255,133,0.18); box-shadow: 0 0 16px rgba(48,255,133,0.18); }
        .btn-danger {
            background: var(--red-glow);
            color: var(--red);
            border: 1px solid rgba(255,77,106,0.18);
        }
        .btn-danger:hover { background: rgba(255,77,106,0.20); box-shadow: 0 0 16px rgba(255,77,106,0.2); }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
        }
        .btn-outline:hover {
            background: rgba(149,255,69,0.06);
            color: var(--text);
            border-color: var(--border-hover);
        }
        .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 8px; min-height: 34px; }
        .btn-lg { padding: 12px 20px; font-size: 14px; min-height: 46px; }

        /* ── Forms ────────────────────────────── */
        input, textarea, select {
            width: 100%;
            padding: 11px 14px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: var(--radius-xs);
            color: var(--text);
            font-size: 16px;
            font-family: inherit;
            transition: all 0.2s;
            -webkit-appearance: none;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(149,255,69,0.05);
            box-shadow: 0 0 0 3px var(--accent-glow), var(--glow-accent);
        }
        input::placeholder, textarea::placeholder { color: var(--text-tertiary); }
        textarea { resize: vertical; min-height: 96px; }
        select { cursor: pointer; }
        select option { background: var(--surface-solid); color: var(--text); }
        label {
            display: block;
            font-weight: 500;
            margin-bottom: 6px;
            font-size: 13px;
            color: var(--text-secondary);
            letter-spacing: 0.01em;
        }
        .form-group { margin-bottom: 16px; }

        /* ── Badges ───────────────────────────── */
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.02em;
        }
        .p1 { background: var(--green-glow); color: var(--green); }
        .p2 { background: var(--cyan-glow); color: var(--cyan); }
        .p3 { background: rgba(255,229,102,0.12); color: var(--yellow); }
        .p4 { background: var(--orange-glow); color: var(--orange); }
        .p5 { background: var(--red-glow); color: var(--red); }

        .status-pending { color: var(--text-tertiary); }
        .status-in_progress { color: var(--accent); }
        .status-completed { color: var(--green); }

        /* ── Typography ──────────────────────── */
        h1 {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.6px;
            line-height: 1.2;
        }
        h2 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: -0.3px;
        }
        .muted { color: var(--text-secondary); font-size: 13px; }

        /* ── Utilities ───────────────────────── */
        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 10px;
        }
        .mb-sm { margin-bottom: 8px; }
        .mb-md { margin-bottom: 16px; }
        .mt-xs { margin-top: 4px; }

        .alerts {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 14px;
        }
        .alert {
            border-radius: var(--radius-sm);
            padding: 12px 14px;
            border: 1px solid var(--border);
            background: var(--surface-raised);
            font-size: 13px;
            line-height: 1.45;
        }
        .alert-success {
            border-color: rgba(48,255,133,0.25);
            color: var(--green);
            background: var(--green-glow);
            box-shadow: 0 0 12px rgba(48,255,133,0.08);
        }
        .alert-error {
            border-color: rgba(255,77,106,0.25);
            color: var(--red);
            background: var(--red-glow);
            box-shadow: 0 0 12px rgba(255,77,106,0.08);
        }
        .alert-info {
            border-color: rgba(149,255,69,0.25);
            color: var(--accent-bright);
            background: var(--accent-glow);
            box-shadow: 0 0 12px rgba(149,255,69,0.08);
        }

        /* ── Mobile Tab Bar ──────────────────── */
        .mobile-tabbar {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 110;
            padding: 8px 12px calc(8px + env(safe-area-inset-bottom));
            background: rgba(3,5,3,0.94);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border-top: 1px solid rgba(149,255,69,0.10);
        }
        .mobile-tabbar-inner {
            max-width: 960px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 4px;
        }
        .mobile-tabbar a {
            color: var(--text-tertiary);
            text-decoration: none;
            text-align: center;
            padding: 8px 4px;
            font-size: 11px;
            font-weight: 500;
            border-radius: 10px;
            transition: all 0.25s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
        }
        .mobile-tabbar a .tab-icon {
            font-size: 18px;
            line-height: 1;
        }
        .mobile-tabbar a.active {
            color: var(--accent-bright);
            background: var(--accent-glow);
            box-shadow: 0 0 12px rgba(149,255,69,0.12);
        }
        .mobile-tabbar a.mobile-cta {
            color: var(--accent-bright);
        }
        .mobile-tabbar a.mobile-cta.active {
            background: var(--accent);
            color: #041005;
            box-shadow: var(--glow-accent);
        }

        /* ── Button Loader ───────────────────── */
        .btn.loading, button.loading {
            pointer-events: none;
            opacity: 0.7;
            position: relative;
        }
        .btn.loading .btn-text, button.loading .btn-text { visibility: hidden; }
        .btn.loading::after, button.loading::after {
            content: '';
            position: absolute;
            width: 16px; height: 16px;
            top: 50%; left: 50%;
            margin: -8px 0 0 -8px;
            border: 2px solid var(--loader-track);
            border-top-color: var(--loader-head);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Animations ──────────────────────── */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: fadeIn 0.4s ease-out both; }
        .d1 { animation-delay: 0.05s; }
        .d2 { animation-delay: 0.1s; }
        .d3 { animation-delay: 0.15s; }
        .d4 { animation-delay: 0.2s; }
        .d5 { animation-delay: 0.25s; }

        /* ── Section headers ─────────────────── */
        .section-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 14px;
        }
        .section-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        /* ── PWA standalone ───────────────────── */
        @media (display-mode: standalone) {
            body { padding-top: env(safe-area-inset-top); }
            .page-content { padding-bottom: calc(100px + env(safe-area-inset-bottom)); }
        }

        /* ── Tablet+ ─────────────────────────── */
        @media (min-width: 720px) {
            .container { padding: 0 24px; }
            nav { padding: 14px 0; }
            nav .brand {
                font-size: 17px;
                text-align: left;
            }
            nav .nav-links {
                display: flex;
                gap: 4px;
            }
            .page-content { padding: 32px 0 80px; }
            .card {
                padding: 20px;
                margin-bottom: 14px;
            }
            .alerts { margin-bottom: 16px; }
            .btn-lg { padding: 12px 28px; font-size: 14px; }
            input, textarea, select { font-size: 14px; }
            textarea { min-height: 80px; }
            h1 { font-size: 30px; }
            h2 { font-size: 17px; }
            .flex-between {
                align-items: center;
                flex-wrap: nowrap;
                gap: 16px;
            }
            .mobile-tabbar { display: none; }
        }

        {% block extra_style %}{% endblock %}
    </style>
</head>
<body>
    {% if not hide_nav %}
    <nav>
        <div class="container">
            <a href="/" class="brand">Task<span>Manager</span></a>
            <div class="nav-links">
                <a href="/" class="{% if request.url.path == '/' %}active{% endif %}">Home</a>
                <a href="/projects" class="{% if request.url.path.startswith('/projects') %}active{% endif %}">Projects</a>
                <a href="/schedule" class="{% if request.url.path.startswith('/schedule') %}active{% endif %}">Schedule</a>
                <a href="/deepwork" class="{% if request.url.path.startswith('/deepwork') %}active{% endif %}">Focus</a>
                <a href="/tasks/add" class="nav-cta {% if request.url.path.startswith('/tasks/add') %}active{% endif %}">+ New Task</a>
            </div>
        </div>
    </nav>
    {% endif %}
    <div class="container">
        <div class="page-content">
            {% if alerts %}
            <div class="alerts">
                {% for alert in alerts %}
                <div class="alert alert-{{ alert.kind }}">{{ alert.message }}</div>
                {% endfor %}
            </div>
            {% endif %}
            {% block content %}{% endblock %}
        </div>
    </div>
    {% if not hide_nav and authenticated %}
    <div class="mobile-tabbar">
        <div class="mobile-tabbar-inner">
            <a href="/" class="{% if request.url.path == '/' %}active{% endif %}">
                <span class="tab-icon">&#9750;</span>Home
            </a>
            <a href="/projects" class="{% if request.url.path.startswith('/projects') %}active{% endif %}">
                <span class="tab-icon">&#128194;</span>Projects
            </a>
            <a href="/schedule" class="{% if request.url.path.startswith('/schedule') %}active{% endif %}">
                <span class="tab-icon">&#128197;</span>Schedule
            </a>
            <a href="/deepwork" class="{% if request.url.path.startswith('/deepwork') %}active{% endif %}">
                <span class="tab-icon">&#9201;</span>Focus
            </a>
            <a href="/tasks/add" class="mobile-cta {% if request.url.path.startswith('/tasks/add') %}active{% endif %}">
                <span class="tab-icon">&#43;</span>New
            </a>
        </div>
    </div>
    {% endif %}
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/static/sw.js')
                .then(() => console.log('SW registered'))
                .catch((e) => console.log('SW failed:', e));
        }
        // Global: add loading spinner to submit buttons on form submit
        document.addEventListener('submit', function(e) {
            var form = e.target;
            if (form.dataset.submitting === 'true') {
                e.preventDefault();
                return;
            }

            var btn = e.submitter || form.querySelector('button[type="submit"], input[type="submit"]');
            form.dataset.submitting = 'true';

            if (btn && !btn.classList.contains('loading')) {
                if (btn.tagName === 'BUTTON') {
                    var text = btn.innerHTML;
                    btn.innerHTML = '<span class="btn-text">' + text + '</span>';
                }
                btn.classList.add('loading');
                setTimeout(function(){ btn.disabled = true; }, 10);
            }
        });
    </script>
</body>
</html>
