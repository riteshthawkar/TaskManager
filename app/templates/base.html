<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>TaskManager</title>

    <!-- PWA -->
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Tasks">
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --surface: rgba(28,28,30,0.72);
            --surface-solid: #1c1c1e;
            --surface-hover: rgba(44,44,46,0.8);
            --surface-raised: rgba(44,44,46,0.65);
            --border: rgba(255,255,255,0.08);
            --border-hover: rgba(255,255,255,0.14);
            --text: #f5f5f7;
            --text-secondary: rgba(255,255,255,0.50);
            --text-tertiary: rgba(255,255,255,0.30);
            --accent: #0a84ff;
            --green: #30d158;
            --orange: #ff9f0a;
            --red: #ff453a;
            --purple: #bf5af2;
            --cyan: #64d2ff;
            --yellow: #ffd60a;
            --radius: 16px;
            --radius-sm: 12px;
            --radius-xs: 10px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container { max-width: 880px; margin: 0 auto; padding: 0 14px; }

        /* ── Nav ────────────────────────── */
        nav {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border-bottom: 1px solid var(--border);
            padding: 10px 0 12px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        nav .container {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 12px;
        }
        nav .brand {
            font-size: 15px;
            font-weight: 700;
            color: var(--text);
            text-decoration: none;
            letter-spacing: -0.3px;
            text-align: center;
        }
        nav .nav-links {
            display: none;
        }
        nav .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 11px;
            font-weight: 500;
            padding: 9px 0;
            border-radius: var(--radius-xs);
            transition: all 0.2s;
            text-align: center;
            white-space: nowrap;
        }
        nav .nav-links a.active {
            color: var(--text);
            background: rgba(255,255,255,0.06);
        }
        nav .nav-links a:hover { color: var(--text); background: rgba(255,255,255,0.06); }
        nav .nav-links a.nav-cta {
            background: var(--accent);
            color: #fff;
            font-weight: 600;
        }
        nav .nav-links a.nav-cta:hover { background: #409cff; }

        .page-content { padding: 20px 0 98px; }

        /* ── Glass Card ────────────────── */
        .card {
            background: var(--surface);
            backdrop-filter: blur(40px) saturate(150%);
            -webkit-backdrop-filter: blur(40px) saturate(150%);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 14px;
        }

        /* ── Buttons ───────────────────── */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: var(--radius-xs);
            border: none;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            font-family: inherit;
            text-decoration: none;
            transition: all 0.2s;
            min-height: 40px;
        }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-primary:hover { background: #409cff; }
        .btn-success { background: rgba(48,209,88,0.14); color: var(--green); border: 1px solid rgba(48,209,88,0.18); }
        .btn-success:hover { background: rgba(48,209,88,0.22); }
        .btn-danger { background: rgba(255,69,58,0.12); color: var(--red); border: 1px solid rgba(255,69,58,0.15); }
        .btn-danger:hover { background: rgba(255,69,58,0.20); }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-secondary); }
        .btn-outline:hover { background: rgba(255,255,255,0.05); color: var(--text); border-color: var(--border-hover); }
        .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 8px; min-height: 34px; }
        .btn-lg { padding: 12px 18px; font-size: 13px; min-height: 46px; }

        /* ── Forms ──────────────────────── */
        input, textarea, select {
            width: 100%;
            padding: 10px 14px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: var(--radius-xs);
            color: var(--text);
            font-size: 16px;
            font-family: inherit;
            transition: all 0.2s;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(255,255,255,0.07);
        }
        input::placeholder, textarea::placeholder { color: var(--text-tertiary); }
        textarea { resize: vertical; min-height: 96px; }
        select { cursor: pointer; }
        select option { background: var(--surface-solid); color: var(--text); }
        label { display: block; font-weight: 500; margin-bottom: 6px; font-size: 13px; color: var(--text-secondary); }
        .form-group { margin-bottom: 16px; }

        /* ── Badges ─────────────────────── */
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
        }
        .p1 { background: rgba(48,209,88,0.12); color: var(--green); }
        .p2 { background: rgba(100,210,255,0.12); color: var(--cyan); }
        .p3 { background: rgba(255,214,10,0.12); color: var(--yellow); }
        .p4 { background: rgba(255,159,10,0.12); color: var(--orange); }
        .p5 { background: rgba(255,69,58,0.12); color: var(--red); }

        .status-pending { color: var(--text-tertiary); }
        .status-in_progress { color: var(--accent); }
        .status-completed { color: var(--green); }

        /* ── Typography ────────────────── */
        h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
        h2 { font-size: 16px; font-weight: 600; margin-bottom: 12px; letter-spacing: -0.2px; }
        .muted { color: var(--text-secondary); font-size: 13px; }

        /* ── Utilities ─────────────────── */
        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 10px;
        }
        .mb-sm { margin-bottom: 8px; }
        .mb-md { margin-bottom: 16px; }
        .mt-xs { margin-top: 4px; }

        .alerts {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 14px;
        }
        .alert {
            border-radius: var(--radius-sm);
            padding: 12px 14px;
            border: 1px solid var(--border);
            background: var(--surface-raised);
            font-size: 13px;
            line-height: 1.45;
        }
        .alert-success {
            border-color: rgba(48,209,88,0.22);
            color: var(--green);
        }
        .alert-error {
            border-color: rgba(255,69,58,0.22);
            color: var(--red);
        }
        .alert-info {
            border-color: rgba(10,132,255,0.22);
            color: var(--accent);
        }

        .mobile-tabbar {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 110;
            padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
            background: rgba(0,0,0,0.82);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border-top: 1px solid var(--border);
        }
        .mobile-tabbar-inner {
            max-width: 880px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 8px;
        }
        .mobile-tabbar a {
            color: var(--text-secondary);
            text-decoration: none;
            text-align: center;
            padding: 10px 6px;
            font-size: 11px;
            border-radius: 12px;
            transition: all 0.2s;
        }
        .mobile-tabbar a.active {
            color: var(--text);
            background: rgba(255,255,255,0.07);
        }
        .mobile-tabbar a.mobile-cta {
            background: var(--accent);
            color: #fff;
            font-weight: 600;
        }

        /* ── Button Loader ─────────────── */
        .btn.loading, button.loading {
            pointer-events: none;
            opacity: 0.7;
            position: relative;
        }
        .btn.loading .btn-text, button.loading .btn-text { visibility: hidden; }
        .btn.loading::after, button.loading::after {
            content: '';
            position: absolute;
            width: 16px; height: 16px;
            top: 50%; left: 50%;
            margin: -8px 0 0 -8px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Animations ────────────────── */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: fadeIn 0.35s ease-out both; }
        .d1 { animation-delay: 0.04s; }
        .d2 { animation-delay: 0.08s; }
        .d3 { animation-delay: 0.12s; }
        .d4 { animation-delay: 0.16s; }

        /* ── PWA standalone ─────────────── */
        @media (display-mode: standalone) {
            body { padding-top: env(safe-area-inset-top); }
            .page-content { padding-bottom: calc(60px + env(safe-area-inset-bottom)); }
        }

        @media (min-width: 720px) {
            .container { padding: 0 20px; }
            nav { padding: 14px 0; }
            nav .container {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
                gap: 16px;
            }
            nav .brand {
                font-size: 17px;
                text-align: left;
            }
            nav .nav-links {
                display: flex;
                gap: 2px;
            }
            nav .nav-links a {
                font-size: 13px;
                padding: 7px 14px;
            }
            .page-content { padding: 32px 0 80px; }
            .card {
                padding: 20px;
                margin-bottom: 12px;
            }
            .alerts { margin-bottom: 16px; }
            .btn-lg { padding: 12px 24px; font-size: 14px; }
            input, textarea, select { font-size: 14px; }
            textarea { min-height: 80px; }
            h1 { font-size: 28px; }
            h2 { font-size: 17px; }
            .flex-between {
                align-items: center;
                flex-wrap: nowrap;
                gap: 16px;
            }
            .mobile-tabbar { display: none; }
        }

        {% block extra_style %}{% endblock %}
    </style>
</head>
<body>
    <nav>
        <div class="container">
            <a href="/" class="brand">TaskManager</a>
            <div class="nav-links">
                <a href="/" class="{% if request.url.path == '/' %}active{% endif %}">Home</a>
                <a href="/schedule" class="{% if request.url.path.startswith('/schedule') %}active{% endif %}">Schedule</a>
                <a href="/deepwork" class="{% if request.url.path.startswith('/deepwork') %}active{% endif %}">Focus</a>
                <a href="/tasks/add" class="nav-cta {% if request.url.path.startswith('/tasks/add') %}active{% endif %}">+ New</a>
            </div>
        </div>
    </nav>
    <div class="container">
        <div class="page-content">
            {% if alerts %}
            <div class="alerts">
                {% for alert in alerts %}
                <div class="alert alert-{{ alert.kind }}">{{ alert.message }}</div>
                {% endfor %}
            </div>
            {% endif %}
            {% block content %}{% endblock %}
        </div>
    </div>
    <div class="mobile-tabbar">
        <div class="mobile-tabbar-inner">
            <a href="/" class="{% if request.url.path == '/' %}active{% endif %}">Home</a>
            <a href="/schedule" class="{% if request.url.path.startswith('/schedule') %}active{% endif %}">Schedule</a>
            <a href="/deepwork" class="{% if request.url.path.startswith('/deepwork') %}active{% endif %}">Focus</a>
            <a href="/tasks/add" class="mobile-cta {% if request.url.path.startswith('/tasks/add') %}active{% endif %}">+ New</a>
        </div>
    </div>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/static/sw.js')
                .then(() => console.log('SW registered'))
                .catch((e) => console.log('SW failed:', e));
        }
        // Global: add loading spinner to submit buttons on form submit
        document.addEventListener('submit', function(e) {
            var form = e.target;
            if (form.dataset.submitting === 'true') {
                e.preventDefault();
                return;
            }

            var btn = e.submitter || form.querySelector('button[type="submit"], input[type="submit"]');
            form.dataset.submitting = 'true';

            if (btn && !btn.classList.contains('loading')) {
                if (btn.tagName === 'BUTTON') {
                    var text = btn.innerHTML;
                    btn.innerHTML = '<span class="btn-text">' + text + '</span>';
                }
                btn.classList.add('loading');
                // Prevent double submit
                setTimeout(function(){ btn.disabled = true; }, 10);
            }
        });
    </script>
</body>
</html>
