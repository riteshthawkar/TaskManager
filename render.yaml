services:
  - type: web
    name: taskmanager
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: APP_ENV
        value: production
      - key: ENABLE_SCHEDULER
        value: "true"
      - key: NOTIFICATION_CHECK_MINUTES
        value: "10"
      - key: APP_USERNAME
        value: admin
      - key: APP_PASSWORD
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: SESSION_HTTPS_ONLY
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: EMAIL_PROVIDER
        value: resend
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: NOTIFY_EMAIL
        sync: false
